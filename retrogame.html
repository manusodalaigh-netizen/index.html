<!DOCTYPE html>
<html>
<head>
  <title>Retro Strawberry Catcher</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: "Courier New", monospace;
      text-align: center;
    }

    h1 {
      color: #ff4d6d;
      text-shadow: 3px 3px #000;
    }

    canvas {
      background: #222;
      border: 5px solid #ffcc00;
      image-rendering: pixelated;
    }

    p {
      color: #ddd;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-family: "Courier New", monospace;
      font-size: 16px;
      background: #ffcc00;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🍓 Retro Strawberry Catcher 🍓</h1>
  <p>Move with LEFT and RIGHT arrows. Catch strawberries. Avoid rotten berries!</p>

  <canvas id="game" width="500" height="400"></canvas>
  <br>
  <button onclick="restartGame()">Restart Game</button>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let player;
    let items;
    let score;
    let lives;
    let gameOver;
    let keys;

    function restartGame() {
      player = {
        x: 220,
        y: 350,
        width: 60,
        height: 20,
        speed: 6
      };

      items = [];
      score = 0;
      lives = 3;
      gameOver = false;
      keys = {};

      gameLoop();
    }

    document.addEventListener("keydown", function(event) {
      keys[event.key] = true;
    });

    document.addEventListener("keyup", function(event) {
      keys[event.key] = false;
    });

    function createItem() {
      const isGood = Math.random() > 0.25;

      items.push({
        x: Math.random() * (canvas.width - 30),
        y: -30,
        size: 28,
        speed: 2 + Math.random() * 3,
        good: isGood
      });
    }

    function drawPlayer() {
      ctx.fillStyle = "#00d9ff";
      ctx.fillRect(player.x, player.y, player.width, player.height);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(player.x + 10, player.y - 8, 10, 8);
      ctx.fillRect(player.x + 40, player.y - 8, 10, 8);
    }

    function drawItem(item) {
      ctx.font = item.size + "px Arial";
      ctx.fillText(item.good ? "🍓" : "💀", item.x, item.y);
    }

    function updatePlayer() {
      if (keys["ArrowLeft"] && player.x > 0) {
        player.x -= player.speed;
      }

      if (keys["ArrowRight"] && player.x < canvas.width - player.width) {
        player.x += player.speed;
      }
    }

    function updateItems() {
      for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        item.y += item.speed;

        const caught =
          item.x < player.x + player.width &&
          item.x + item.size > player.x &&
          item.y < player.y + player.height &&
          item.y + item.size > player.y;

        if (caught) {
          if (item.good) {
            score += 10;
          } else {
            lives -= 1;
          }

          items.splice(i, 1);
        } else if (item.y > canvas.height) {
          if (item.good) {
            lives -= 1;
          }

          items.splice(i, 1);
        }
      }
    }

    function drawScore() {
      ctx.fillStyle = "white";
      ctx.font = "18px Courier New";
      ctx.fillText("Score: " + score, 15, 25);
      ctx.fillText("Lives: " + lives, 390, 25);
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffcc00";
      ctx.font = "40px Courier New";
      ctx.fillText("GAME OVER", 120, 180);

      ctx.fillStyle = "white";
      ctx.font = "20px Courier New";
      ctx.fillText("Final Score: " + score, 165, 220);
      ctx.fillText("Click Restart to play again", 110, 260);
    }

    let itemTimer = 0;

    function gameLoop() {
      if (gameOver) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      updatePlayer();
      updateItems();

      itemTimer++;

      if (itemTimer > 35) {
        createItem();
        itemTimer = 0;
      }

      drawPlayer();

      for (let item of items) {
        drawItem(item);
      }

      drawScore();

      if (lives <= 0) {
        gameOver = true;
        drawGameOver();
        return;
      }

      requestAnimationFrame(gameLoop);
    }

    restartGame();
  </script>
</body>
</html>
